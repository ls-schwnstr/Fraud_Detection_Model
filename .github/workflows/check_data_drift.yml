name: Check Data Drift

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  check-and-retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install Flask-Testing
          pip install mlflow

      - name: Set up environment variables
        run: echo "MLFLOW_TRACKING_URI=http://localhost:5005" >> $GITHUB_ENV

      - name: Run MLflow
        run: |
          mkdir -p ${{ github.workspace }}/mlruns
          nohup mlflow server --backend-store-uri sqlite:///${{ github.workspace }}/mlruns/mlflow.db --default-artifact-root=${{ github.workspace }}/mlruns/artifacts --host localhost --port 5005 > ${{ github.workspace }}/mlruns/mlflow.log 2>&1 &
        env:
          MLFLOW_TRACKING_URI: http://localhost:5005

      - name: Wait for MLflow server to be ready
        run: |
          for i in {1..10}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5005/ | grep -q "200"; then
              echo "MLflow server is up and running"
              break
            fi
            echo "Waiting for MLflow server to start ..."
            sleep 5
          done

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run Data Drift Check
        run: |
          python app/models/data_drift_check.py

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mlflow-artifacts
          path: ${{ github.workspace }}/mlruns/

