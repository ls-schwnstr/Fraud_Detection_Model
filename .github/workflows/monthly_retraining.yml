name: Run Simulation Tests

on:
  workflow_dispatch:  # Manually trigger this workflow

jobs:
  setup-and-test:
    runs-on: ubuntu-latest

    services:
      mlflow:
        image: ghcr.io/mlflow/mlflow:v2.0.1
        ports:
          - 5004:5004
        options: >-
          --mount type=bind,source=${{ github.workspace }}/mlruns,target=/mlflow/artifacts
        env:
          MLFLOW_TRACKING_URI: http://localhost:5004

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up environment variables
        run: echo "MLFLOW_TRACKING_URI=http://localhost:5004" >> $GITHUB_ENV

      - name: Generate data for the year
        run: |
          PYTHONPATH=app python -m generate_fake_data

      - name: Simulate data and retraining for each week
        run: |
          PYTHONPATH=app python -m data_insertion
