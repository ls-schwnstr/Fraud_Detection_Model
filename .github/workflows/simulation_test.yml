name: Simulation Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mlflow:
        image: ghcr.io/mlflow/mlflow:v2.0.1
        ports:
          - 5004:5004
        options: >-
          --mount type=bind,source=${{ github.workspace }}/mlruns,target=/mlflow/artifacts
        env:
          MLFLOW_TRACKING_URI: http://localhost:5004

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Create mlruns directory
        run: mkdir -p ${{ github.workspace }}/mlruns

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install Flask-Testing

      - name: Set up environment variables
        run: echo "MLFLOW_TRACKING_URI=http://localhost:5004" >> $GITHUB_ENV

      - name: Generate Fake Data
        run: python generate_fake_data.py

      - name: Run Simulation Tests
        run: python -m unittest discover -s tests -p "test_simulation.py"
